<!DOCTYPE html>
<html>
<head>
    <title>Agent - Working Version</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { background: #1a1a2e; color: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        .header h1 { font-size: 20px; }
        .header .status { font-size: 12px; opacity: 0.7; margin-top: 4px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card h3 { margin-bottom: 12px; color: #1a1a2e; }
        .input-group { display: flex; gap: 10px; margin-bottom: 12px; }
        .input-group input { flex: 1; padding: 12px 16px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        .input-group input:focus { border-color: #1a73e8; outline: none; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%; }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-primary:hover { background: #1557b0; }
        .btn-primary:disabled { background: #999; cursor: not-allowed; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c62828; }
        .call-status { padding: 12px; border-radius: 8px; margin-top: 12px; text-align: center; font-weight: 600; }
        .call-status.idle { background: #e9ecef; color: #6c757d; }
        .call-status.ringing { background: #fff3e0; color: #e65100; }
        .call-status.connected { background: #e8f5e9; color: #2e7d32; }
        .call-status.error { background: #ffebee; color: #c62828; }
        .call-status.ready { background: #e3f2fd; color: #0d47a1; }
        .log-box { background: #1a1a2e; color: #aed581; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 11px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; margin: 3px; }
        .badge-success { background: #e8f5e9; color: #2e7d32; }
        .badge-error { background: #ffebee; color: #c62828; }
        .badge-warning { background: #fff3e0; color: #e65100; }
        .badge-info { background: #e3f2fd; color: #0d47a1; }
        .badge-ready { background: #81c784; color: #1b5e20; }
        .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .actions button { flex: 1; min-width: 80px; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; }
        .btn-warning { background: #ff9800; color: white; }
        .btn-success { background: #34a853; color: white; }
        .click-prompt { 
            background: #e3f2fd; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            text-align: center;
            font-weight: 600;
            color: #0d47a1;
            border: 2px dashed #0d47a1;
            cursor: pointer;
            transition: all 0.3s;
        }
        .click-prompt:hover {
            background: #bbdefb;
        }
        .click-prompt.success {
            background: #e8f5e9;
            border-color: #2e7d32;
            color: #2e7d32;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>📞 Agent - Working</h1>
        <div class="status" id="deviceStatus">🔴 Device: Not Ready</div>
        <div style="margin-top:10px;">
            <span class="badge badge-info" id="sdkBadge">📦 SDK: Checking...</span>
            <span class="badge badge-info" id="tokenBadge">🔑 Token: Unknown</span>
            <span class="badge badge-info" id="audioBadge">🎵 Audio: Suspended</span>
            <span class="badge badge-info" id="stateBadge">📊 State: Idle</span>
        </div>
    </div>

    <div class="card">
        <div class="click-prompt" id="clickPrompt" onclick="resumeAudio()">
            👆 <strong>Click here</strong> or anywhere on the page to enable audio
        </div>
        <h3>📤 Make a Call</h3>
        <div class="input-group">
            <input type="text" id="phoneInput" placeholder="+1234567890" />
            <button class="btn btn-primary" id="callBtn" onclick="makeCall()" disabled>📞 Call</button>
        </div>
        <button class="btn btn-danger" id="hangupBtn" onclick="hangup()" style="display:none;">🔴 Hang Up</button>
        <div id="callStatus" class="call-status idle">Ready to call</div>
        
        <div class="actions">
            <button class="btn-warning" onclick="initDevice()">🔄 Reconnect</button>
            <button class="btn-success" onclick="resumeAudio()">🎵 Resume Audio</button>
            <button class="btn-warning" onclick="forceDeviceReady()">⚡ Force Ready</button>
        </div>
    </div>

    <div class="card">
        <h3>📋 Logs</h3>
        <div id="logBox" class="log-box">⏳ Initializing...</div>
        <button onclick="clearLogs()" style="margin-top:8px;padding:4px 12px;background:#dc3545;color:white;border:none;border-radius:4px;cursor:pointer;font-size:12px;">🗑️ Clear</button>
    </div>
</div>

<!-- ============================================ -->
<!-- LOAD SDK FROM LOCAL FILE -->
<!-- ============================================ -->
<script src="/twilio.min.js"></script>

<script>
// ============================================
// CONFIGURATION
// ============================================
const CONFIG = {
    BASE_URL: window.location.origin,
};

// ============================================
// STATE
// ============================================
let device = null;
let currentCall = null;
let deviceReady = false;
let deviceRegistered = false;

// ============================================
// DOM REFS
// ============================================
const deviceStatus = document.getElementById('deviceStatus');
const callBtn = document.getElementById('callBtn');
const hangupBtn = document.getElementById('hangupBtn');
const phoneInput = document.getElementById('phoneInput');
const logBox = document.getElementById('logBox');
const sdkBadge = document.getElementById('sdkBadge');
const tokenBadge = document.getElementById('tokenBadge');
const audioBadge = document.getElementById('audioBadge');
const stateBadge = document.getElementById('stateBadge');
const callStatus = document.getElementById('callStatus');
const clickPrompt = document.getElementById('clickPrompt');

// ============================================
// LOGGING
// ============================================
function addLog(msg, type = 'info') {
    const time = new Date().toLocaleTimeString();
    const colors = {
        info: '#aed581',
        error: '#ef9a9a',
        warning: '#ffcc80',
        success: '#81c784',
        debug: '#90caf9'
    };
    const color = colors[type] || '#aed581';
    logBox.innerHTML = `<span style="color:${color}">[${time}] ${msg}</span>\n${logBox.innerHTML}`;
    console.log(`[${time}] ${msg}`);
}

function clearLogs() {
    logBox.innerHTML = '📋 Logs cleared';
}

// ============================================
// FORCE DEVICE READY (Emergency fix)
// ============================================
function forceDeviceReady() {
    addLog('⚡ Force setting device to ready...', 'warning');
    deviceReady = true;
    deviceStatus.textContent = '🟢 Device: Ready (Forced)';
    deviceStatus.className = 'call-status ready';
    callBtn.disabled = false;
    callStatus.textContent = 'Ready to call';
    callStatus.className = 'call-status idle';
    addLog('✅ Device force-ready!', 'success');
}

// ============================================
// RESUME AUDIO CONTEXT
// ============================================
async function resumeAudio() {
    addLog('🎵 Attempting to resume audio...', 'debug');
    
    try {
        // Try to resume Twilio's audio context
        if (typeof Twilio !== 'undefined' && Twilio.Device && Twilio.Device._audioContext) {
            const ctx = Twilio.Device._audioContext;
            if (ctx) {
                addLog(`🎵 AudioContext state: ${ctx.state}`, 'debug');
                if (ctx.state === 'suspended') {
                    await ctx.resume();
                    addLog('✅ AudioContext resumed!', 'success');
                    audioBadge.textContent = '🎵 Audio: Running ✅';
                    audioBadge.className = 'badge badge-success';
                    clickPrompt.textContent = '✅ Audio is now enabled!';
                    clickPrompt.className = 'click-prompt success';
                    
                    // Check if device is ready now
                    if (device && deviceRegistered && !deviceReady) {
                        addLog('🔄 Device is registered - marking as ready!', 'success');
                        deviceReady = true;
                        deviceStatus.textContent = '🟢 Device: Ready';
                        deviceStatus.className = 'call-status ready';
                        callBtn.disabled = false;
                        callStatus.textContent = 'Ready to call';
                        callStatus.className = 'call-status idle';
                        addLog('✅✅✅ DEVICE READY! ✅✅✅', 'success');
                    }
                    return true;
                } else if (ctx.state === 'running') {
                    addLog('✅ AudioContext already running', 'success');
                    audioBadge.textContent = '🎵 Audio: Running ✅';
                    audioBadge.className = 'badge badge-success';
                    return true;
                }
            }
        }
        
        // Fallback: try to create a new audio context
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
                addLog('✅ New AudioContext created and resumed', 'success');
                audioBadge.textContent = '🎵 Audio: Running ✅';
                audioBadge.className = 'badge badge-success';
                return true;
            }
        } catch (e) {
            addLog(`⚠️ Could not create AudioContext: ${e.message}`, 'warning');
        }
        
    } catch (error) {
        addLog(`❌ Audio resume error: ${error.message}`, 'error');
    }
    return false;
}

// ============================================
// CHECK SDK
// ============================================
function checkSDK() {
    if (typeof Twilio !== 'undefined' && typeof Twilio.Device !== 'undefined') {
        addLog('✅ Twilio SDK loaded!', 'success');
        sdkBadge.textContent = '📦 SDK: Loaded ✅';
        sdkBadge.className = 'badge badge-success';
        return true;
    } else {
        addLog('❌ Twilio SDK NOT loaded', 'error');
        sdkBadge.textContent = '📦 SDK: Not Loaded ❌';
        sdkBadge.className = 'badge badge-error';
        return false;
    }
}

// ============================================
// FETCH ACCESS TOKEN
// ============================================
async function fetchToken() {
    try {
        addLog('🔄 Fetching token...', 'debug');
        tokenBadge.textContent = '🔑 Token: Fetching...';
        tokenBadge.className = 'badge badge-warning';
        
        const response = await fetch(`${CONFIG.BASE_URL}/token?identity=agent&t=${Date.now()}`);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        addLog(`✅ Token received (${data.token.length} chars)`, 'success');
        tokenBadge.textContent = '🔑 Token: OK ✅';
        tokenBadge.className = 'badge badge-success';
        
        return data.token;
    } catch (error) {
        addLog(`❌ Token fetch failed: ${error.message}`, 'error');
        tokenBadge.textContent = '🔑 Token: Error ❌';
        tokenBadge.className = 'badge badge-error';
        return null;
    }
}

// ============================================
// INITIALIZE DEVICE
// ============================================
async function initDevice() {
    addLog('🚀 Initializing Twilio Device...', 'info');
    deviceStatus.textContent = '🟡 Device: Connecting...';
    callStatus.className = 'call-status ringing';
    callStatus.textContent = 'Connecting...';
    deviceReady = false;
    deviceRegistered = false;
    
    // Check SDK first
    if (!checkSDK()) {
        addLog('❌ Cannot initialize: SDK not loaded', 'error');
        return;
    }
    
    try {
        // Get token
        const token = await fetchToken();
        if (!token) {
            throw new Error('No token received');
        }
        
        // Clean up old device
        if (device) {
            addLog('🧹 Cleaning up old device...', 'debug');
            device.destroy();
            device = null;
        }
        
        // Create new device
        addLog('🔧 Creating Device...', 'debug');
        device = new Twilio.Device(token, {
            logLevel: 1,
            allowIncomingWhileBusy: true,
            codecPreferences: ['opus', 'pcmu']
        });
        addLog('✅ Device created', 'success');
        
        // Set up event handlers
        device.on('ready', () => {
            addLog('✅✅✅ DEVICE READY! ✅✅✅', 'success');
            deviceReady = true;
            deviceRegistered = true;
            deviceStatus.textContent = '🟢 Device: Ready';
            deviceStatus.className = 'call-status ready';
            callBtn.disabled = false;
            callStatus.textContent = 'Ready to call';
            callStatus.className = 'call-status idle';
            stateBadge.textContent = '📊 State: Ready';
            stateBadge.className = 'badge badge-success';
        });
        
        device.on('error', (error) => {
            addLog(`❌ Device error: ${error.message}`, 'error');
            deviceStatus.textContent = '🔴 Device: Error';
            deviceStatus.className = 'call-status error';
            deviceReady = false;
            callBtn.disabled = true;
        });
        
        device.on('incoming', (call) => {
            addLog(`📞 Incoming call from: ${call.parameters.From}`, 'info');
            acceptCall(call);
        });
        
        // Register
        addLog('🔗 Registering device...', 'debug');
        await device.register();
        addLog('✅ Registration initiated', 'success');
        deviceRegistered = true;
        stateBadge.textContent = '📊 State: Registered';
        stateBadge.className = 'badge badge-warning';
        
        // Check audio context state
        setTimeout(() => {
            try {
                if (typeof Twilio !== 'undefined' && Twilio.Device && Twilio.Device._audioContext) {
                    const ctx = Twilio.Device._audioContext;
                    if (ctx) {
                        addLog(`🎵 AudioContext state: ${ctx.state}`, 'debug');
                        audioBadge.textContent = `🎵 Audio: ${ctx.state}`;
                        if (ctx.state === 'suspended') {
                            audioBadge.className = 'badge badge-warning';
                            addLog('💡 Click the page to resume audio', 'info');
                        } else if (ctx.state === 'running') {
                            audioBadge.className = 'badge badge-success';
                        }
                    }
                }
            } catch (e) {}
        }, 1000);
        
    } catch (error) {
        addLog(`❌ Init error: ${error.message}`, 'error');
        deviceStatus.textContent = '🔴 Device: Error';
        deviceStatus.className = 'call-status error';
    }
}

// ============================================
// ACCEPT INCOMING CALL
// ============================================
function acceptCall(call) {
    currentCall = call;
    call.accept();
    
    call.on('accept', () => {
        addLog('✅ Call accepted', 'success');
        callStatus.textContent = 'Connected';
        callStatus.className = 'call-status connected';
        hangupBtn.style.display = 'block';
        callBtn.disabled = true;
    });
    
    call.on('disconnect', () => {
        addLog('📞 Call ended', 'info');
        callStatus.textContent = 'Call ended';
        callStatus.className = 'call-status idle';
        hangupBtn.style.display = 'none';
        callBtn.disabled = false;
        currentCall = null;
    });
}

// ============================================
// MAKE CALL
// ============================================
async function makeCall() {
    const number = phoneInput.value.trim();
    if (!number) {
        alert('Enter a phone number');
        return;
    }
    
    // Try to resume audio first
    await resumeAudio();
    
    if (!deviceReady || !device) {
        addLog('❌ Device not ready - trying to reconnect...', 'error');
        initDevice();
        return;
    }
    
    addLog(`📞 Dialing: ${number}`, 'info');
    callStatus.textContent = 'Ringing...';
    callStatus.className = 'call-status ringing';
    callBtn.disabled = true;
    
    try {
        currentCall = await device.connect({
            params: { To: number }
        });
        
        currentCall.on('accept', () => {
            addLog('✅ Call connected', 'success');
            callStatus.textContent = 'Connected';
            callStatus.className = 'call-status connected';
            hangupBtn.style.display = 'block';
        });
        
        currentCall.on('disconnect', () => {
            addLog('📞 Call ended', 'info');
            callStatus.textContent = 'Call ended';
            callStatus.className = 'call-status idle';
            hangupBtn.style.display = 'none';
            callBtn.disabled = false;
            currentCall = null;
        });
        
        currentCall.on('error', (error) => {
            addLog(`❌ Call error: ${error.message}`, 'error');
            callStatus.textContent = 'Error';
            callStatus.className = 'call-status error';
            callBtn.disabled = false;
        });
        
    } catch (error) {
        addLog(`❌ Failed to call: ${error.message}`, 'error');
        callStatus.textContent = 'Error';
        callStatus.className = 'call-status error';
        callBtn.disabled = false;
    }
}

// ============================================
// HANG UP
// ============================================
function hangup() {
    if (currentCall) {
        addLog('🔴 Hanging up...', 'info');
        currentCall.disconnect();
        hangupBtn.style.display = 'none';
        callBtn.disabled = false;
        callStatus.textContent = 'Call ended';
        callStatus.className = 'call-status idle';
        currentCall = null;
    }
}

// ============================================
// GET MICROPHONE PERMISSION
// ============================================
async function getMicrophone() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        addLog('✅ Microphone: Available', 'success');
        stream.getTracks().forEach(track => track.stop());
        return true;
    } catch (error) {
        addLog(`⚠️ Microphone: ${error.message}`, 'warning');
        return false;
    }
}

// ============================================
// AUTO-RESUME ON ANY CLICK
// ============================================
document.addEventListener('click', function resumeOnClick() {
    resumeAudio();
}, { once: true });

// Also resume on any button click
document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
        setTimeout(resumeAudio, 100);
    });
});

// ============================================
// INIT
// ============================================
async function initialize() {
    addLog('🚀 Agent dashboard loading...', 'info');
    addLog(`📡 Backend: ${CONFIG.BASE_URL}`, 'debug');
    
    // Check SDK
    if (!checkSDK()) {
        addLog('⏳ Waiting for SDK to load...', 'warning');
        setTimeout(() => {
            if (typeof Twilio !== 'undefined' && typeof Twilio.Device !== 'undefined') {
                addLog('✅ SDK loaded!', 'success');
                initDevice();
            } else {
                addLog('❌ SDK still not loaded', 'error');
            }
        }, 2000);
        return;
    }
    
    // Check microphone
    await getMicrophone();
    
    // Initialize device
    setTimeout(initDevice, 500);
}

// Enter key for phone input
phoneInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') makeCall();
});

// Start
initialize();

// Handle unhandled errors
window.addEventListener('error', (event) => {
    addLog(`⚠️ Unhandled error: ${event.message}`, 'error');
});

addLog('💡 Click the page or "Resume Audio" button to enable audio', 'info');
</script>

</body>
</html>
